version: 2
updates:
  # Dépendances npm (monorepo)
  - package-ecosystem: npm
    directory: "/"
    target-branch: dev # jamais main (réservée) ; intégration via dev, CI sur dependabot/**
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    target-branch: dev
    schedule:
      interval: weekly

  # Images Docker
  - package-ecosystem: docker
    directory: "/"
    target-branch: dev
    schedule:
      interval: weekly
