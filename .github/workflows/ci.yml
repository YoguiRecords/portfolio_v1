name: CI

on:
  push:
    branches: [llm, dev, "dependabot/**"]
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

# Annule les runs précédents sur la même ref (économie de CI)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest

    # Postgres éphémère pour les tests d'intégration (schéma `test` isolé).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: portfolio
          POSTGRES_PASSWORD: portfolio_dev
          POSTGRES_DB: portfolio
        ports:
          - 5436:5432
        options: >-
          --health-cmd "pg_isready -U portfolio"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true # assets (favicon, images, fonts) sont en Git LFS

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Le client Prisma est généré (non versionné) : requis avant typecheck/build
      - name: Generate Prisma client
        run: pnpm --filter @portfolio/db db:generate

      # `.env.test` est git-ignoré : on le matérialise pour la CI (DB du service).
      - name: Prepare test env
        run: echo "DATABASE_URL=postgresql://portfolio:portfolio_dev@localhost:5436/portfolio?schema=test" > .env.test

      - name: Deploy migrations to test schema
        run: pnpm --filter @portfolio/db db:test:deploy

      - name: Lint
        run: pnpm -r lint

      - name: Typecheck
        run: pnpm -r typecheck

      # `pnpm test` serializes packages (--workspace-concurrency=1) so the
      # DB-backed suites don't race on the shared `test` schema.
      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm -r build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: portfolio
          POSTGRES_PASSWORD: portfolio_dev
          POSTGRES_DB: portfolio
        ports:
          - 5436:5432
        options: >-
          --health-cmd "pg_isready -U portfolio"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Le serveur web (next dev lancé par Playwright) lit la DB sur le schéma public.
      DATABASE_URL: postgresql://portfolio:portfolio_dev@localhost:5436/portfolio?schema=public
      CI: "true"

    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @portfolio/db db:generate

      - name: Deploy migrations (public schema)
        run: pnpm --filter @portfolio/db db:deploy

      # Le seed de CONTENU (profil, projets, sections) alimente la home publique
      # testée en E2E — pas le seed admin (qui exige des identifiants).
      - name: Seed content
        run: pnpm --filter @portfolio/db exec tsx prisma/seed-content.ts

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

  # Publication des images Docker — UNIQUEMENT sur tag de version (release),
  # et seulement si la qualité (build + E2E) est verte. Les images sont poussées
  # sur GitHub Packages (ghcr.io). Les services proxy/db/minio/umami utilisent
  # des images publiques et ne sont pas reconstruits ici.
  docker:
    name: Build & Push Docker images
    needs: [build, e2e]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            context: .
            dockerfile: apps/web/Dockerfile
          - service: admin
            context: .
            dockerfile: apps/admin/Dockerfile
          - service: image-processor
            context: ./services/image-processor
            dockerfile: ./services/image-processor/Dockerfile
          - service: cv-renderer
            context: ./services/cv-renderer
            dockerfile: ./services/cv-renderer/Dockerfile
          - service: migrate
            context: .
            dockerfile: packages/db/Dockerfile

    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true # le build web/admin embarque les assets (Git LFS)

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Déduit les tags d'image depuis le tag git (vX.Y.Z → X.Y.Z) + `latest`.
      # `metadata-action` force le nom d'image en minuscules (requis par ghcr).
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
