name: CI

on:
  push:
    branches: [llm, dev, "dependabot/**"]
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

# Annule les runs précédents sur la même ref (économie de CI)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true # assets (favicon, images, fonts) sont en Git LFS

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Le client Prisma est généré (non versionné) : requis avant typecheck/build
      - name: Generate Prisma client
        run: pnpm --filter @portfolio/db db:generate

      - name: Lint
        run: pnpm -r lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Build
        run: pnpm -r build
