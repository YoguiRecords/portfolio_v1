packages:
  - apps/*
  - packages/*
  - services/*
  # cv-renderer est un service Docker autonome (déps installées dans son
  # Dockerfile via npm) — hors du workspace pnpm pour ne pas polluer le lockfile.
  - "!services/cv-renderer"

# Scripts de build natifs explicitement approuvés (pnpm 11 — sécurité : rien ne build sans aval).
allowBuilds:
  '@parcel/watcher': true
  "@prisma/engines": true
  '@swc/core': true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true

# Paquets trop récents exclus du gate "minimum release age".
minimumReleaseAgeExclude:
  - prettier@3.9.0
