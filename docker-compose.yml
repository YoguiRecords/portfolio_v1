name: portfolio

# RÃĐseaux : `edge` (joignable par le futur proxy) et `internal` (aucun accÃĻs Internet).
# SÃĐcuritÃĐ : seul le proxy (Phase C) publiera un port en prod. Les ports publiÃĐs ci-dessous
# sont des commoditÃĐs DEV (outils DB, console MinIO) et seront retirÃĐs/fermÃĐs en prod.

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      UMAMI_DB_USER: ${UMAMI_DB_USER}
      UMAMI_DB_PASSWORD: ${UMAMI_DB_PASSWORD}
      WEB_DB_PASSWORD: ${WEB_DB_PASSWORD}
      ADMIN_DB_PASSWORD: ${ADMIN_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./datas/init:/docker-entrypoint-initdb.d:ro
    # Strictement interne. Le port dev (5436) et l'accÃĻs `edge` qu'il exige
    # vivent dans docker-compose.override.yml (git-ignorÃĐ, cf. l'example).
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Init one-shot : applique les migrations Prisma en attente AVANT que web/admin
  # dÃĐmarrent â le schÃĐma et la DB ne peuvent plus diverger (plus de `migrate
  # deploy` manuel Ã  oublier). Tourne avec le rÃīle propriÃĐtaire (POSTGRES_USER),
  # seul Ã  avoir les droits DDL ; interne uniquement, s'arrÃŠte aprÃĻs exÃĐcution.
  migrate:
    build:
      context: .
      dockerfile: packages/db/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    depends_on:
      db:
        condition: service_healthy
    networks: [internal]
    restart: "no"

  minio:
    image: minio/minio:latest # prod : ÃĐpingler par digest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    # Ports dev (API S3 9100 / console 9101) dans docker-compose.override.yml.
    # `edge` reste requis en prod : Caddy route /media/* vers minio:9000.
    volumes:
      - minio-data:/data
    networks: [internal, edge]
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Init one-shot : crÃĐe le bucket `media` en lecture publique (images).
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint:
      - sh
      - -c
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
        mc mb --ignore-existing local/media &&
        mc anonymous set download local/media
    networks: [internal]
    restart: "no"

  # Convertisseur d'images â webp (Flask + Pillow). RÃĐutilisÃĐ du projet OXO
  # (ÂŦ convertisseur YODEB Âŧ). Interne uniquement, port 5050 jamais publiÃĐ.
  image-processor:
    build:
      context: ./services/image-processor
    restart: unless-stopped
    networks: [internal] # interne uniquement â appelÃĐ par le back office, jamais exposÃĐ
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Rendu PDF du CV (Chromium headless via Playwright). Interne uniquement, port
  # 5051 jamais publiÃĐ, sans accÃĻs Internet. Visite la route interne durcie de
  # `admin` (token CV_RENDER_TOKEN) et imprime le CvDocument en PDF.
  cv-renderer:
    build:
      context: ./services/cv-renderer
    restart: unless-stopped
    environment:
      PORT: "5051"
      ADMIN_INTERNAL_URL: http://admin:3101
      CV_RENDER_TOKEN: ${CV_RENDER_TOKEN:-dev-cv-token}
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks: [internal] # interne uniquement â appelÃĐ par le back office, jamais exposÃĐ
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:5051/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      DATABASE_TYPE: postgresql
      DATABASE_URL: postgresql://${UMAMI_DB_USER}:${UMAMI_DB_PASSWORD}@db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
    # Port dev (3102, dashboard direct) dans docker-compose.override.yml. Via proxy en prod.
    depends_on:
      db:
        condition: service_healthy
    networks: [internal, edge]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3100"
      HOSTNAME: 0.0.0.0
      # Site public â rÃīle lecture seule.
      DATABASE_URL: postgresql://app_web:${WEB_DB_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      # Chatbot public : clÃĐ OpenRouter (serveur uniquement, jamais exposÃĐe au client).
      # Le chatbot reste inactif tant que `AiAssistantConfig.isPublicChatEnabled` est faux.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # RÃĐservation de crÃĐneaux : le site public appelle l'API interne d'`admin`
      # (jamais via le proxy) avec un token partagÃĐ. `app_web` ne lit jamais le
      # calendrier privÃĐ ni les RDV â tout passe par `admin`.
      ADMIN_INTERNAL_URL: http://admin:3101
      APPOINTMENTS_INTERNAL_TOKEN: ${APPOINTMENTS_INTERNAL_TOKEN:-dev-appt-token}
      # Base des liens publics (emails : lien d'annulation self-service).
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3100}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [internal, edge]

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3101"
      HOSTNAME: 0.0.0.0
      # Back office â rÃīle lecture/ÃĐcriture.
      DATABASE_URL: postgresql://app_admin:${ADMIN_DB_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      # Ãcriture MinIO (mÃĐdias + PDF du CV) et lecture publique.
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-http://localhost:9100/media}
      # GÃĐnÃĐration du PDF du CV (service interne cv-renderer + route interne durcie).
      CV_RENDERER_URL: http://cv-renderer:5051
      CV_RENDER_TOKEN: ${CV_RENDER_TOKEN:-dev-cv-token}
      # Assistance IA du back office (mÃŠme clÃĐ OpenRouter que le site).
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # RÃĐservation de crÃĐneaux : token partagÃĐ de l'API interne (appelÃĐe par `web`)
      # + base des liens publics (emails d'annulation).
      APPOINTMENTS_INTERNAL_TOKEN: ${APPOINTMENTS_INTERNAL_TOKEN:-dev-appt-token}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3100}
      # DEV LOCAL UNIQUEMENT : raccourci de connexion (bypass password+MFA).
      # NE JAMAIS dÃĐfinir en prod (dÃĐfaut off). L'image tourne en NODE_ENV=production
      # mÃŠme en local, d'oÃđ ce flag runtime dÃĐdiÃĐ plutÃīt qu'un check NODE_ENV.
      ENABLE_DEV_QUICK_LOGIN: ${ENABLE_DEV_QUICK_LOGIN:-true}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      image-processor:
        condition: service_healthy
      cv-renderer:
        condition: service_healthy
    networks: [internal, edge]

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      # DEV : sites en HTTP. PROD : mettre les domaines nus (ex. WEB_SITE=yohan-debusscher.com) â HTTPS auto.
      WEB_SITE: http://yohan-debusscher.com
      ADMIN_SITE: http://bo.yohan-debusscher.com
      STATS_SITE: http://stats.yohan-debusscher.com
      # Origine publique des images pour la CSP (dev : MinIO sur l'hÃīte).
      # PROD : laisser vide (les mÃĐdias passent par /media/* â mÃŠme origine).
      MEDIA_ORIGIN: http://localhost:9100
    ports:
      - "8090:80" # DEV (HTTP). PROD : 80:80 + 443:443
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on: [web, admin, minio, umami]
    networks: [edge]

networks:
  edge:
  internal:
    internal: true

volumes:
  postgres-data:
  minio-data:
  caddy-data:
  caddy-config:
