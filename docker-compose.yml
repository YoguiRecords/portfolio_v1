name: portfolio

# Réseaux : `edge` (joignable par le futur proxy) et `internal` (aucun accès Internet).
# Sécurité : seul le proxy (Phase C) publiera un port en prod. Les ports publiés ci-dessous
# sont des commodités DEV (outils DB, console MinIO) et seront retirés/fermés en prod.

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      UMAMI_DB_USER: ${UMAMI_DB_USER}
      UMAMI_DB_PASSWORD: ${UMAMI_DB_PASSWORD}
    ports:
      - "5436:5432" # DEV uniquement (outils). Interne en prod.
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./datas/init:/docker-entrypoint-initdb.d:ro
    # `edge` est requis en DEV pour publier le port 5436 (un réseau `internal: true`
    # n'est pas routable depuis l'hôte). En PROD : retirer `edge` ET le mapping de port
    # → `db` redevient strictement interne. À déplacer dans un docker-compose.override.yml.
    networks: [internal, edge]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest # prod : épingler par digest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9100:9000" # API S3
      - "9101:9001" # console (DEV)
    volumes:
      - minio-data:/data
    networks: [internal, edge]
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  converter:
    build:
      context: .
      dockerfile: services/converter/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "5050"
    networks: [internal] # interne uniquement — appelé par le back office, jamais exposé
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5050/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      DATABASE_TYPE: postgresql
      DATABASE_URL: postgresql://${UMAMI_DB_USER}:${UMAMI_DB_PASSWORD}@db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
    ports:
      - "3102:3000" # DEV (dashboard). Via proxy en prod.
    depends_on:
      db:
        condition: service_healthy
    networks: [internal, edge]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3100"
      HOSTNAME: 0.0.0.0
    depends_on:
      db:
        condition: service_healthy
    networks: [internal, edge]

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3101"
      HOSTNAME: 0.0.0.0
    depends_on:
      db:
        condition: service_healthy
      converter:
        condition: service_healthy
    networks: [internal, edge]

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      # DEV : sites en HTTP. PROD : mettre les domaines nus (ex. WEB_SITE=yohan-debusscher.com) → HTTPS auto.
      WEB_SITE: http://yohan-debusscher.com
      ADMIN_SITE: http://bo.yohan-debusscher.com
      STATS_SITE: http://stats.yohan-debusscher.com
    ports:
      - "8090:80" # DEV (HTTP). PROD : 80:80 + 443:443
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on: [web, admin, minio, umami]
    networks: [edge]

networks:
  edge:
  internal:
    internal: true

volumes:
  postgres-data:
  minio-data:
  caddy-data:
  caddy-config:
